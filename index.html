<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل الحضور والأجرة</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0B4F6C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#EEF1F5;
    --surface:#FFFFFF;
    --surface-2:#F6F8FA;
    --ink:#101828;
    --ink-soft:#5D6B82;
    --ink-faint:#98A2B3;
    --line:#E3E7EE;
    --primary:#0B4F6C;
    --primary-dark:#083548;
    --primary-tint:#E7F0F4;
    --in:#12805C;
    --in-bg:#E7F6EF;
    --in-line:#B9E4CE;
    --out:#B42318;
    --out-bg:#FDECEA;
    --out-line:#F5C2BE;
    --debt:#B54708;
    --debt-bg:#FFF6E7;
    --debt-line:#F3D8A6;
    --shadow-sm:0 1px 2px rgba(16,24,40,.04);
    --shadow-md:0 4px 14px rgba(16,24,40,.07);
    --radius-lg:16px;
    --radius-md:12px;
    --radius-sm:8px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif;
    background:
      radial-gradient(1200px 400px at 50% -120px, rgba(11,79,108,.10), transparent 60%),
      var(--bg);
    color:var(--ink);
    direction:rtl;
    padding-bottom:60px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{ font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif; }
  .mono{ font-family:'IBM Plex Mono', 'Courier New', monospace; }

  /* ---------- Topbar ---------- */
  .topbar{
    background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color:#fff; padding:18px 20px; box-shadow:var(--shadow-md);
  }
  .topbar-inner{ max-width:680px; margin:0 auto; display:flex; align-items:center; gap:14px; }
  .brand-mark{
    width:44px; height:44px; border-radius:12px; flex-shrink:0;
    background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .brand-title{ font-size:18px; font-weight:900; letter-spacing:.2px; }
  .brand-sub{ font-size:12px; color:rgba(255,255,255,.75); margin-top:2px; font-weight:500; }
  .brand-badge{
    margin-inline-start:auto; font-size:11px; background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22); padding:5px 10px; border-radius:20px;
    display:flex; align-items:center; gap:5px; white-space:nowrap;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:#5EEAA0; }

  .wrap{ max-width:680px; margin:0 auto; padding:22px 18px 0; }

  /* ---------- Generic form controls ---------- */
  .row{ display:flex; gap:10px; }
  input{
    font-family:inherit; border:1.5px solid var(--line); border-radius:var(--radius-sm);
    padding:11px 13px; font-size:14px; background:var(--surface); color:var(--ink);
    outline:none; width:100%; transition:border-color .15s, box-shadow .15s;
  }
  input:focus{ border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint); }
  input::placeholder{ color:var(--ink-faint); }
  input[type=number]{ font-family:'IBM Plex Mono', monospace; }

  button{
    font-family:'Tajawal',inherit; cursor:pointer; border:none; border-radius:var(--radius-sm);
    font-weight:700; font-size:13.5px; padding:10px 16px;
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    transition:transform .06s, box-shadow .15s, background .15s, border-color .15s;
  }
  button:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--primary); color:#fff; box-shadow:var(--shadow-sm); }
  .btn-primary:hover{ background:var(--primary-dark); }
  .btn-outline{ background:#fff; border:1.5px solid var(--line); color:var(--ink); }
  .btn-outline:hover{ border-color:var(--primary); color:var(--primary); }
  .btn-green{ background:var(--in); color:#fff; }
  .btn-red{ background:var(--out); color:#fff; }
  .btn-full{ width:100%; }
  .btn-sm{ padding:8px 12px; font-size:12.5px; }

  .icon-btn{
    background:none; border:none; padding:6px; border-radius:8px;
    color:var(--ink-faint); display:inline-flex; align-items:center; justify-content:center;
  }
  .icon-btn:hover{ color:var(--ink); background:var(--surface-2); }
  .icon-btn.danger:hover{ color:var(--out); background:var(--out-bg); }

  /* ---------- Section titles ---------- */
  .section-title{
    display:flex; align-items:center; gap:8px; font-weight:800; margin-bottom:12px;
    font-size:14px; color:var(--ink); font-family:'Cairo',inherit;
  }
  .section-title .badge{
    background:var(--primary-tint); color:var(--primary); font-size:11.5px;
    font-weight:700; padding:2px 9px; border-radius:20px; margin-inline-start:auto;
    font-family:'Tajawal',inherit;
  }

  /* ---------- Worker list ---------- */
  .worker-list{ display:flex; flex-direction:column; gap:8px; margin-top:14px; margin-bottom:28px; }
  .worker-item{
    display:flex; align-items:center; gap:4px;
    background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius-md);
    padding:12px 14px; box-shadow:var(--shadow-sm); transition:box-shadow .15s, border-color .15s;
  }
  .worker-item:hover{ box-shadow:var(--shadow-md); border-color:#D3DAE4; }
  .worker-item .name-btn{
    flex:1; background:none; border:none; padding:6px 2px; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    text-align:right; font-weight:800; font-size:14.5px; color:var(--ink); font-family:'Cairo',inherit;
  }
  .worker-item .meta{ font-size:11.5px; color:var(--ink-faint); font-weight:500; font-family:'IBM Plex Mono',monospace; }
  .avatar{
    width:34px; height:34px; border-radius:9px; background:var(--primary-tint); color:var(--primary);
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px;
    flex-shrink:0; font-family:'Cairo',inherit;
  }
  .worker-row-flex{ display:flex; align-items:center; gap:10px; flex:1; }

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius-lg);
    padding:18px; margin-bottom:22px; box-shadow:var(--shadow-sm);
  }
  .card-title{
    display:flex; align-items:center; gap:8px; font-weight:800; font-size:14px;
    margin-bottom:14px; color:var(--ink); font-family:'Cairo',inherit;
  }
  .label{ font-size:12px; font-weight:700; color:var(--ink-soft); display:block; margin-bottom:6px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .box-in{ background:var(--in-bg); border:1.5px solid var(--in-line); border-radius:var(--radius-md); padding:11px; }
  .box-out{ background:var(--out-bg); border:1.5px solid var(--out-line); border-radius:var(--radius-md); padding:11px; }
  .box-in .label, .box-out .label{ display:flex; align-items:center; gap:5px; margin-bottom:7px; }
  .box-in .label{ color:var(--in); }
  .box-out .label{ color:var(--out); }
  .box-in input{ border-color:#8FD0AE; color:var(--in); font-weight:700; }
  .box-out input{ border-color:#EFA79F; color:var(--out); font-weight:700; }

  .diff-text{ text-align:center; font-size:13px; color:var(--ink-soft); margin-top:12px; }
  .diff-text b{ color:var(--ink); font-family:'IBM Plex Mono',monospace; }

  /* ---------- Records ---------- */
  .records{ display:flex; flex-direction:column; gap:6px; margin-bottom:22px; }
  .rec-row{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:9px 13px; font-size:13px; box-shadow:var(--shadow-sm);
  }
  .rec-row .t-date{ color:var(--ink-faint); font-size:11.5px; font-family:'IBM Plex Mono',monospace; min-width:78px; }
  .rec-row .t-in{ color:var(--in); font-weight:700; }
  .rec-row .t-out{ color:var(--out); font-weight:700; }
  .rec-row .t-hours{ font-weight:800; font-family:'IBM Plex Mono',monospace; color:var(--ink); }

  /* ---------- KPI / Financial summary ---------- */
  .fin-card{
    background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius-lg);
    overflow:hidden; box-shadow:var(--shadow-md); margin-bottom:20px;
  }
  .fin-header{
    background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color:#fff; padding:16px 18px; display:flex; align-items:center; gap:8px;
    font-weight:800; font-size:14px; font-family:'Cairo',inherit;
  }
  .fin-body{ padding:18px; }
  .kpi-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
  .kpi-tile{
    display:none; flex-direction:column; gap:4px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:var(--radius-md); padding:12px 10px; text-align:center;
  }
  .kpi-tile.always{ display:flex; }
  .kpi-label{ font-size:10.5px; color:var(--ink-soft); font-weight:700; }
  .kpi-value{ font-size:16px; font-weight:800; color:var(--ink); font-family:'IBM Plex Mono',monospace; }
  .kpi-value.accent-net{ color:var(--in); }

  .fin-divider{ border:none; border-top:1px dashed var(--line); margin:16px 0; }
  .fin-section-label{
    font-size:12px; font-weight:800; color:var(--debt); display:flex; align-items:center; gap:6px;
    margin-bottom:10px;
  }
  .fin-row-inline{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--debt-bg); border:1.5px solid var(--debt-line); border-radius:var(--radius-md);
    padding:12px 14px; margin-top:12px;
  }
  .fin-row-inline .fr-label{ font-size:13px; font-weight:700; color:var(--ink); }
  .fin-row-inline .fr-value{ font-size:17px; font-weight:900; color:var(--debt); font-family:'IBM Plex Mono',monospace; }

  /* ---------- Toolbar / detail header ---------- */
  .toolbar{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .back-link{
    background:none; border:none; font-weight:700; color:var(--ink-soft); font-size:13.5px;
    margin-bottom:16px; padding:0; display:inline-flex; align-items:center; gap:6px;
  }
  .back-link:hover{ color:var(--primary); }
  .detail-heading{ display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .detail-name{ font-size:19px; font-weight:900; font-family:'Cairo',inherit; }
  .detail-avatar{
    width:46px; height:46px; border-radius:12px; background:var(--primary-tint); color:var(--primary);
    display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px;
    flex-shrink:0; font-family:'Cairo',inherit;
  }

  /* ---------- Modals ---------- */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(16,24,40,.55); backdrop-filter:blur(2px);
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal-box{
    background:#fff; border-radius:var(--radius-lg); padding:22px; max-width:380px; width:100%;
    box-shadow:0 20px 50px rgba(16,24,40,.25);
  }
  .modal-box h3{ margin-bottom:8px; font-size:16px; font-family:'Cairo',inherit; }
  .modal-box p{ font-size:13px; color:var(--ink-soft); margin-bottom:18px; line-height:1.7; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:#fff; padding:11px 20px; border-radius:24px;
    font-size:13px; font-weight:600; opacity:0; transition:opacity .25s, transform .25s;
    z-index:100; pointer-events:none; box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Archive ---------- */
  .archive-list{ margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .archive-item{
    background:var(--surface); border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; font-size:13px; box-shadow:var(--shadow-sm);
  }
  .archive-item .a-title{ font-weight:800; margin-bottom:4px; color:var(--ink); display:flex; align-items:center; gap:6px; }
  .archive-item .a-line{ color:var(--ink-soft); font-size:12px; line-height:1.6; }
  .empty-msg{ text-align:center; color:var(--ink-faint); font-size:13px; padding:30px 10px; }
  .save-status{ font-size:11px; color:var(--ink-faint); text-align:center; margin-top:8px; }

  svg.i{ display:block; flex-shrink:0; }

  @media print{
    .no-print{ display:none !important; }
    .print-only{ display:block !important; }
    body{ background:#fff !important; padding:0; }
  }
  .print-only{ display:none; padding:20px; color:#000; }
  .print-only table{ width:100%; border-collapse:collapse; margin:14px 0; }
  .print-only th, .print-only td{ border:1px solid #999; padding:6px; font-size:13px; }
  .print-only th{ background:#f0f0f0; }
</style>
</head>
<body>

<div class="topbar no-print">
  <div class="topbar-inner">
    <div class="brand-mark">
      <svg class="i" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div>
      <div class="brand-title">سجل الحضور والأجرة</div>
      <div class="brand-sub">دخول · خروج · حساب تلقائي</div>
    </div>
    <div class="brand-badge"><span class="dot"></span> حفظ محلي مفعّل</div>
    <button id="exitAppBtn" title="خروج" style="background:rgba(255,255,255,0.12);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-inline-start:8px;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<script>
document.getElementById('exitAppBtn').addEventListener('click', function () {
  if (confirm('هل تريد الخروج من التطبيق؟')) {
    try { window.close(); } catch (e) {}
    setTimeout(function () {
      if (!document.hidden) {
        alert('لإغلاق التطبيق كاملاً، استعمل زر الرجوع بهاتفك أو الشاشة الرئيسية.');
      }
    }, 300);
  }
});
</script>

<div class="wrap no-print">

  <!-- شاشة قائمة العمال -->
  <div id="screen-list">
    <div class="section-title">
      <svg class="i" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      العمال
      <span class="badge" id="workerCountBadge">0</span>
    </div>
    <button class="btn-outline btn-sm" style="width:100%;margin-top:10px;" onclick="openStatusModal()">
      <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      حالة العمال
    </button>
    <div class="row" style="margin-top:8px;">
      <button class="btn-outline btn-sm" style="flex:1;" onclick="exportBackup()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        تصدير نسخة احتياطية
      </button>
      <button class="btn-outline btn-sm" style="flex:1;" onclick="document.getElementById('importFile').click()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        استيراد نسخة احتياطية
      </button>
      <input type="file" id="importFile" accept="application/json" style="display:none;" onchange="importBackup(event)">
    </div>
    <div class="row" style="margin-top:14px;">
      <input id="newWorkerInput" placeholder="اسم العامل الجديد" onkeydown="if(event.key==='Enter')addWorker()">
      <button class="btn-primary" onclick="addWorker()">
        <svg class="i" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        إضافة
      </button>
    </div>
    <div id="workerList" class="worker-list"></div>
  </div>

  <!-- شاشة تفاصيل العامل -->
  <div id="screen-detail" style="display:none;">
    <button class="back-link" onclick="goBack()">
      <svg class="i" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      رجوع إلى قائمة العمال
    </button>

    <div class="detail-heading">
      <div class="detail-avatar" id="detailAvatar">؟</div>
      <div>
        <h2 class="detail-name" id="detailName"></h2>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-primary btn-sm" onclick="manualSave()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        حفظ
      </button>
      <button class="btn-outline btn-sm" onclick="openArchiveConfirm()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg>
        أرشفة
      </button>
      <button class="btn-outline btn-sm" onclick="toggleArchiveView()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
        عرض الأرشيف
      </button>
      <button class="btn-outline btn-sm" onclick="printCurrent()">
        <svg class="i" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        طباعة الملخص
      </button>
    </div>

    <div class="card">
      <div class="card-title">
        <svg class="i" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        تسجيل يوم عمل
      </div>
      <label class="label">التاريخ</label>
      <input type="date" id="dateInput" style="margin-bottom:6px;">
      <div id="dateWarning" style="display:
